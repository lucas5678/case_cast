<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CaseCast Bank - Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f5f7fa; color: #1a1a2e; }

        .bank-navbar {
            background: linear-gradient(135deg, #0a1628 0%, #1a3a6b 100%);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand { display: flex; align-items: center; gap: 0.75rem; }
        .brand-icon { font-size: 1.5rem; }
        .brand-name { color: #f0a500; font-weight: 700; font-size: 1.2rem; letter-spacing: 0.5px; }
        .brand-badge {
            background: rgba(240,165,0,0.2);
            color: #f0a500;
            font-size: 0.65rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 20px;
            letter-spacing: 1px;
        }

        .navbar-links { display: flex; align-items: center; gap: 0.5rem; }
        .nav-link {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            border: none;
            background: none;
            cursor: pointer;
        }
        .nav-link:hover { background: rgba(255,255,255,0.1); color: white; }

        .nav-dropdown { position: relative; }
        .dropdown-content {
            display: none;
            position: absolute;
            top: calc(100% + 8px);
            left: 0;
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            min-width: 180px;
            overflow: hidden;
            z-index: 100;
        }
        .dropdown-content a {
            display: block;
            padding: 0.75rem 1.25rem;
            color: #1a1a2e;
            text-decoration: none;
            font-size: 0.9rem;
            transition: background 0.2s;
        }
        .dropdown-content a:hover { background: #f5f7fa; color: #1a3a6b; }
        .nav-dropdown:hover .dropdown-content { display: block; }

        .btn-logout {
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            font-size: 0.85rem;
            padding: 0.4rem 1rem;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            transition: all 0.2s;
        }
        .btn-logout:hover { background: rgba(255,255,255,0.1); color: white; }

        .admin-main {
            padding: 2.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .welcome-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid #e2e8f0;
        }
        .welcome-title { font-size: 1.8rem; font-weight: 700; color: #1a1a2e; }
        .welcome-subtitle { color: #6c757d; font-size: 0.95rem; margin-top: 0.25rem; }
        .welcome-badge {
            background: linear-gradient(135deg, #0a1628, #1a3a6b);
            color: #f0a500;
            padding: 0.5rem 1.25rem;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .quick-access-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
        }

        .quick-card {
            background: white;
            border-radius: 12px;
            padding: 2rem 1.5rem;
            text-decoration: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
            transition: all 0.3s ease;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 0.75rem;
        }
        .quick-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 60px rgba(26,58,107,0.15);
            border-color: #1a3a6b;
        }
        .quick-card-icon { font-size: 2.5rem; }
        .quick-card-title { font-size: 1.1rem; font-weight: 600; color: #1a1a2e; }
        .quick-card-desc { font-size: 0.85rem; color: #6c757d; line-height: 1.4; }
    </style>
</head>
<body>
    <nav class="bank-navbar">
        <div class="navbar-brand">
            <span class="brand-icon">🏦</span>
            <span class="brand-name">CaseCast Bank</span>
            <span class="brand-badge">ADMIN</span>
        </div>
        <div class="navbar-links">
            <a href="/admin" class="nav-link">🏠 Home</a>
            <a href="/novo" class="nav-link">➕ Cadastro</a>
            <div class="nav-dropdown">
                <button class="nav-link dropdown-btn">⚡ Operações ▾</button>
                <div class="dropdown-content">
                    <a href="/view-add-credito">💰 Creditar</a>
                    <a href="/view-debitar-credito">💸 Debitar</a>
                </div>
            </div>
            <a href="/view-movimentacao" class="nav-link">📊 Movimentação</a>
        </div>
        <div class="navbar-right">
            <a th:href="@{/logout}" class="btn-logout">Sair →</a>
        </div>
    </nav>
</body>
</html>
